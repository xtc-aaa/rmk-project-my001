# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "XT KB06-MB"
product_name = "XT KB06-MB"
vendor_id = 0x4c4b
product_id = 0x0001
manufacturer = "XTC"
chip = "nrf52840"

[matrix]
# Row and col pins are mandatory
row_pins = ["P1_11", "P0_10"]
col_pins = ["P1_00", "P0_24", "P0_22"]

# RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
# row2col = true

[layout]
rows = 2
cols = 3
layers = 2
keymap = [
    [
        ["A", "B", "C"],
        ["Kc1", "Kc2", "Kc3"],
    ],
    [
        ["_", "TT(1)", "TG(2)"],
        ["_", "_", "_"],
    ],
]
